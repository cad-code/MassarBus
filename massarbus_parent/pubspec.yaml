name: massarbus_parent
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # --- DÉPENDANCES MASSARBUS PARENT ---
  smooth_page_indicator: ^1.1.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  socket_io_client: ^3.1.6
  geolocator: ^14.0.3
  google_maps_flutter: ^2.17.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # DÉCLARATION DES IMAGES 
  assets:
    - assets/logo.png
    - assets/onboarding_1.png
    - assets/onboarding_2.png
    - assets/onboarding_3.png
    - assets/onboarding_4.png
    - assets/bg_homescreen.png
    - assets/histrory_bg.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo-app.png"
  min_sdk_size: 21